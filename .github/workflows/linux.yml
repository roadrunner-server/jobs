name: jobs

on:
  push:
    branches:
      - master
      - stable
  pull_request:
    branches:
      - master
      - stable

jobs:
  rr_jobs_test:
    name: JOBS plugin (Go ${{ matrix.go }}, PHP ${{ matrix.php }}, OS ${{matrix.os}})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        php: ["8.5"]
        go: [stable]
        os: ["ubuntu-latest"]
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6 # action page: <https://github.com/actions/setup-go>
        with:
          go-version: ${{ matrix.go }}
      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2 # action page: <https://github.com/shivammathur/setup-php>
        with:
          php-version: ${{ matrix.php }}
          extensions: sockets
      - name: Check out code
        uses: actions/checkout@v6
      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          cd tests/php_test_files
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Init Composer Cache # Docs: <https://git.io/JfAKn#php---composer>
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install Composer dependencies
        run: cd tests/php_test_files && composer update --prefer-dist --no-progress --ansi
      - name: Init Go modules Cache # Docs: <https://git.io/JfAKn#go---modules>
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: Install Go dependencies
        run: go mod download
      - name: Run golang tests with coverage
        run: |
          cd tests
          mkdir ./coverage-ci

          docker compose -f env/docker-compose-jobs.yaml up -d
          sleep 30

          go test -timeout 20m -v -race -cover -tags=debug -failfast -coverprofile=./coverage-ci/jobs.out -covermode=atomic jobs_general_test.go
          docker compose -f env/docker-compose-jobs.yaml down
      - name: Archive code coverage results
        uses: actions/upload-artifact@v7
        with:
          name: coverage-jobs
          path: ./tests/coverage-ci

  codecov:
    name: Upload codecov
    runs-on: ubuntu-latest
    needs:
      - rr_jobs_test
    timeout-minutes: 60
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Download code coverage results
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true
      - run: |
          echo 'mode: atomic' > summary.txt
          tail -q -n +2 coverage/*.out >> summary.txt
          awk '
            NR == 1 { print; next }
            /^github\.com\/roadrunner-server\/jobs\/v6\// {
              sub(/^github\.com\/roadrunner-server\/jobs\/v6\//, "", $0)
              print
            }
          ' summary.txt > summary.filtered.txt
          mv summary.filtered.txt summary.txt
      - name: upload to codecov
        uses: codecov/codecov-action@v6
        with:
          files: summary.txt
          fail_ci_if_error: false
